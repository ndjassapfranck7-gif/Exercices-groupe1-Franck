<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
   
    <!--Declaration form-->
    <form action="">
        <!--Declaration table-->
        <table>
            <tr>
                <th colspan="2" id="FROM"> <h1 >FORM</h1></th>
            </tr>
            <tr>
                <td><label for="nom">Name</label></td>
                <td><input type="text" name="nom" id="nom" required></td>
            </tr>
            <tr>
                <td><label for="first name">Firt name</label></td>
                <td><input type="text" id="first name" required></td>
            </tr>
        <tr>
            <td><label for="email">Email</label></td>
            <td><input type="email" name="email" id="email"  placeholder="enter your email" required></td>
        </tr>
        <tr>
            <td><label for="subject">subject</label></td>
           <td><textarea name="subject" id="subject" required></textarea></td>
        </tr>
       <tr>
        <td><label for="message">Message</label></td>
        <td><textarea name="message" id="message" rows="7" cols="40" required></textarea></td>
       </tr>
       <tr>
        <td  colspan="2" id="send"><input type="submit" value="send"></td>
       </tr>
        </table>
    </form>
</body>
</html>
